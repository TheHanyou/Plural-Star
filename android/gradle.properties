# Raise AsyncStorage SQLite cap from the default 6MB total / 2MB per record to 20MB.
# Without this, large member rosters with imported avatars or banners can exceed
# the per-record cap, which causes silent write failures and (on some Samsung
# devices) full app-data wipes on next launch — manifesting as the welcome
# screen returning every restart. See react-native-async-storage/async-storage#537
AsyncStorage_db_size_in_MB=20
