pluginManagement {
    includeBuild('../node_modules/@react-native/gradle-plugin')
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id 'com.facebook.react.settings'
}

def reactExt = extensions.findByType(com.facebook.react.ReactSettingsExtension)
if (reactExt != null) {
    reactExt.autolinkLibrariesFromCommand()
}

rootProject.name = 'PluralSpace'
include ':app'
includeBuild('../node_modules/@react-native/gradle-plugin')
